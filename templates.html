<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runvai — Multi-Template Resume Builder</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">

<!-- Header -->
<header class="bg-white shadow-md sticky top-0 z-50">
  <div class="container mx-auto flex justify-between items-center py-4 px-6">
    <h1 class="text-2xl font-bold text-indigo-600">Runvai</h1>
  </div>
</header>

<div class="container mx-auto px-4 py-8 flex flex-col md:flex-row gap-6">

  <!-- Sidebar Form -->
  <div class="md:w-1/3 bg-white shadow-lg rounded-lg p-6 space-y-6">
    <h2 class="text-xl font-bold mb-4">Resume Builder</h2>

    <!-- Template Selector -->
    <div>
      <label class="font-medium mb-2 block">Choose Template</label>
      <select id="templateSelect" class="w-full border rounded px-3 py-2">
        <option value="normalFree">Normal Free</option>
        <option value="atsFree">ATS Optimized Free</option>
        <option value="modernPremium">Modern Pro (Premium)</option>
        <option value="functionalPremium">Functional (Premium)</option>
      </select>
    </div>

    <!-- Personal Info -->
    <div>
      <label class="font-medium mb-2 block">Full Name</label>
      <input type="text" id="fullName" class="w-full border rounded px-3 py-2" placeholder="Jane Doe">
    </div>

    <div>
      <label class="font-medium mb-2 block">Email</label>
      <input type="text" id="email" class="w-full border rounded px-3 py-2" placeholder="jane@example.com">
    </div>

    <div>
      <label class="font-medium mb-2 block">Phone</label>
      <input type="text" id="phone" class="w-full border rounded px-3 py-2" placeholder="+91 9876543210">
    </div>

    <!-- Experience -->
    <div id="experienceContainer">
      <label class="font-medium mb-2 block">Experience</label>
      <div class="mb-2 flex gap-2">
        <textarea class="w-full border rounded px-3 py-2 experienceField" rows="2" placeholder="Job title, Company, Year"></textarea>
        <button type="button" id="addExperience" class="bg-indigo-600 text-white px-2 rounded">+</button>
      </div>
    </div>

    <!-- Education -->
    <div id="educationContainer">
      <label class="font-medium mb-2 block">Education</label>
      <div class="mb-2 flex gap-2">
        <textarea class="w-full border rounded px-3 py-2 educationField" rows="2" placeholder="Degree, College, Year"></textarea>
        <button type="button" id="addEducation" class="bg-indigo-600 text-white px-2 rounded">+</button>
      </div>
    </div>

    <!-- Skills -->
    <div>
      <label class="font-medium mb-2 block">Skills (comma separated)</label>
      <input type="text" id="skills" class="w-full border rounded px-3 py-2" placeholder="HTML, CSS, JS">
    </div>

    <!-- Buttons -->
    <div class="flex flex-col gap-3">
      <button id="downloadBtn" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 font-medium">Download PDF</button>
    </div>
  </div>

  <!-- Live Preview -->
  <div class="md:w-2/3 bg-white shadow-lg rounded-lg p-6">
    <h2 class="text-xl font-bold mb-4">Live Preview</h2>
    <div id="resumePreview" class="border p-6 space-y-4">

      <h1 id="previewName" class="text-2xl font-bold text-gray-800">Jane Doe</h1>
      <p id="previewEmail" class="text-gray-600">jane@example.com</p>
      <p id="previewPhone" class="text-gray-600">+91 9876543210</p>
      <hr>

      <div id="previewExperienceSection">
        <h3 class="font-bold text-gray-700">Experience</h3>
        <p class="previewExperience">Job title, Company, Year</p>
      </div>

      <div id="previewEducationSection">
        <h3 class="font-bold text-gray-700">Education</h3>
        <p class="previewEducation">Degree, College, Year</p>
      </div>

      <div>
        <h3 class="font-bold text-gray-700">Skills</h3>
        <p id="previewSkills">HTML, CSS, JS</p>
      </div>

    </div>
  </div>

</div>

<script>
  // Elements
  const fullName = document.getElementById('fullName');
  const email = document.getElementById('email');
  const phone = document.getElementById('phone');
  const skills = document.getElementById('skills');
  const templateSelect = document.getElementById('templateSelect');

  const previewName = document.getElementById('previewName');
  const previewEmail = document.getElementById('previewEmail');
  const previewPhone = document.getElementById('previewPhone');
  const previewSkills = document.getElementById('previewSkills');
  const resumePreview = document.getElementById('resumePreview');

  const experienceContainer = document.getElementById('experienceContainer');
  const educationContainer = document.getElementById('educationContainer');
  const previewExperienceSection = document.getElementById('previewExperienceSection');
  const previewEducationSection = document.getElementById('previewEducationSection');

  // Update preview
  fullName.addEventListener('input', () => previewName.textContent = fullName.value || "Jane Doe");
  email.addEventListener('input', () => previewEmail.textContent = email.value || "jane@example.com");
  phone.addEventListener('input', () => previewPhone.textContent = phone.value || "+91 9876543210");
  skills.addEventListener('input', () => previewSkills.textContent = skills.value || "HTML, CSS, JS");

  // Dynamic experience
  function updateExperiencePreview() {
    const allExp = document.querySelectorAll('.experienceField');
    previewExperienceSection.innerHTML = '<h3 class="font-bold text-gray-700">Experience</h3>';
    allExp.forEach(exp => {
      const p = document.createElement('p');
      p.textContent = exp.value || "Job title, Company, Year";
      p.className = "previewExperience";
      previewExperienceSection.appendChild(p);
    });
  }

  // Dynamic education
  function updateEducationPreview() {
    const allEdu = document.querySelectorAll('.educationField');
    previewEducationSection.innerHTML = '<h3 class="font-bold text-gray-700">Education</h3>';
    allEdu.forEach(edu => {
      const p = document.createElement('p');
      p.textContent = edu.value || "Degree, College, Year";
      p.className = "previewEducation";
      previewEducationSection.appendChild(p);
    });
  }

  // Add new experience field
  document.getElementById('addExperience').addEventListener('click', () => {
    const div = document.createElement('div');
    div.className = "mb-2 flex gap-2";
    div.innerHTML = `<textarea class="w-full border rounded px-3 py-2 experienceField" rows="2" placeholder="Job title, Company, Year"></textarea>
    <button type="button" class="bg-red-600 text-white px-2 rounded removeExp">-</button>`;
    experienceContainer.appendChild(div);

    div.querySelector('.experienceField').addEventListener('input', updateExperiencePreview);
    div.querySelector('.removeExp').addEventListener('click', () => {
      div.remove();
      updateExperiencePreview();
    });
  });

  // Add new education field
  document.getElementById('addEducation').addEventListener('click', () => {
    const div = document.createElement('div');
    div.className = "mb-2 flex gap-2";
    div.innerHTML = `<textarea class="w-full border rounded px-3 py-2 educationField" rows="2" placeholder="Degree, College, Year"></textarea>
    <button type="button" class="bg-red-600 text-white px-2 rounded removeEdu">-</button>`;
    educationContainer.appendChild(div);

    div.querySelector('.educationField').addEventListener('input', updateEducationPreview);
    div.querySelector('.removeEdu').addEventListener('click', () => {
      div.remove();
      updateEducationPreview();
    });
  });

  // Initial input listeners for experience and education
  document.querySelectorAll('.experienceField').forEach(exp => exp.addEventListener('input', updateExperiencePreview));
  document.querySelectorAll('.educationField').forEach(edu => edu.addEventListener('input', updateEducationPreview));

  // Template switch
  templateSelect.addEventListener('change', () => {
    const val = templateSelect.value;
    resumePreview.className = "border p-6 space-y-4";

    if(val === 'normalFree'){
      resumePreview.classList.add('text-gray-800', 'font-sans');
    } else if(val === 'atsFree'){
      resumePreview.classList.add('text-gray-900', 'font-serif');
    } else if(val === 'modernPremium'){
      resumePreview.classList.add('text-indigo-700', 'font-sans');
    } else if(val === 'functionalPremium'){
      resumePreview.classList.add('text-gray-900', 'font-mono');
    }
  });

  // Download PDF / DOCX
  document.getElementById('downloadBtn').addEventListener('click', () => {
    const val = templateSelect.value;
    if(val.includes('Premium')){
      alert("Premium template selected! PDF + DOCX download coming soon in Pro version.");
    }
    html2pdf().from(resumePreview).set({margin:0.5, filename:'Runvai_Resume.pdf'}).save();
  });
</script>

</body>
</html>
