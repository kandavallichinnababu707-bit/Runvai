<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Runvai — Futuristic Builder 2.1</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #0ff; /* neon cyan accent */
    --bg: #0a0a1a;
    --panel: rgba(255,255,255,0.05);
    --panel-hover: rgba(255,255,255,0.1);
    --glass: rgba(255,255,255,0.05);
    --font-main: 'Inter', sans-serif;
  }

  body {
    font-family: var(--font-main);
    background: linear-gradient(135deg, #0a0a1a 0%, #121230 100%);
    color: #e0e0ff;
    min-height: 100vh;
  }

  .glass-panel {
    backdrop-filter: blur(12px);
    background: var(--glass);
    border-radius: 1rem;
    border: 1px solid rgba(0,255,255,0.2);
  }

  .focus-outline:focus {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .progress-bar {
    height: 10px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), #60f3fa);
  }

  [contenteditable]:focus {
    outline: 2px solid rgba(0,255,255,0.3);
    outline-offset: 2px;
  }

  .indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
  }

  .tpl-btn:hover {
    background: var(--panel-hover);
  }

  main::-webkit-scrollbar {
    width: 8px;
  }
  main::-webkit-scrollbar-thumb {
    background: rgba(0,255,255,0.3);
    border-radius: 4px;
  }

  footer {
    text-align: center;
    padding: 1rem 0;
    color: rgba(255,255,255,0.4);
    font-size: 0.8rem;
  }

</style>
</head>
<body class="p-6">

<div class="max-w-[1400px] mx-auto flex flex-col gap-6">

  <!-- HEADER -->
  <header class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 rounded-lg bg-gradient-to-tr from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg">
        <svg width="24" height="24" viewBox="0 0 24 24" stroke="white" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6h16M4 12h16M4 18h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <h1 class="text-2xl font-bold text-white">Runvai — Futuristic Builder</h1>
        <p class="text-sm text-cyan-200">Templates 2.1 · Free & Pro · Smart PDF Export</p>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <div class="w-[260px]">
        <div class="bg-gradient-to-r from-cyan-400/20 to-blue-400/20 rounded-md p-2 flex items-center gap-2 shadow-inner">
          <div class="w-2/5 text-xs text-cyan-200">Profile completeness</div>
          <div class="w-3/5 bg-cyan-900 rounded-full p-1">
            <div id="completenessBar" class="progress-bar w-1/2"></div>
          </div>
        </div>
      </div>
      <button id="exportPdfBtn" class="px-4 py-2 bg-cyan-500 hover:bg-cyan-400 text-black font-semibold rounded-lg shadow-lg">Export PDF</button>
      <button id="saveBtn" class="px-4 py-2 bg-transparent border border-cyan-500 hover:bg-cyan-600/20 text-white rounded-lg font-semibold">Save</button>
    </div>
  </header>

  <!-- TOOLBAR -->
  <div class="flex gap-3 items-center glass-panel p-3 shadow-lg">
    <label class="text-sm text-cyan-200">Font</label>
    <select id="fontSelect" class="rounded p-1 text-sm bg-black/30 border border-cyan-500">
      <option value="Inter">Sans (Inter)</option>
      <option value="Rajdhani">Modern (Rajdhani)</option>
      <option value="monospace">Mono</option>
    </select>

    <label class="text-sm text-cyan-200 ml-3">Text color</label>
    <input id="fontColor" type="color" value="#e0e0ff" class="w-10 h-8 border-0">

    <label class="text-sm text-cyan-200 ml-3">Highlight</label>
    <input id="highlightColor" type="color" value="#0ff" class="w-10 h-8 border-0">

    <div class="ml-auto flex items-center gap-2">
      <button id="undoBtn" class="px-3 py-1 border rounded text-sm text-cyan-200 hover:bg-cyan-500/20">Undo</button>
      <button id="redoBtn" class="px-3 py-1 border rounded text-sm text-cyan-200 hover:bg-cyan-500/20">Redo</button>
      <select id="addSection" class="border rounded text-sm p-1 bg-black/30 border-cyan-500">
        <option value="">Add section</option>
        <option value="project">Project</option>
        <option value="cert">Certification</option>
        <option value="ach">Achievement</option>
      </select>
      <button id="clearFmt" class="px-2 py-1 border rounded text-sm text-cyan-200 hover:bg-cyan-500/20">Clear</button>
    </div>
  </div>

  <!-- MAIN -->
  <main class="grid grid-cols-12 gap-6">
    <!-- LEFT PANEL -->
    <aside class="col-span-3 flex flex-col gap-4 glass-panel p-4 shadow-lg">
      <h3 class="text-cyan-200 font-semibold mb-2">Templates</h3>
      <div class="flex flex-col gap-2">
        <button class="tpl-btn p-3 rounded-md text-left hover:bg-cyan-400/20" data-tpl="free-1">Free — Clean Minimal (ATS)</button>
        <button class="tpl-btn p-3 rounded-md text-left bg-cyan-900/20" data-tpl="free-2">Free — Fresher (Two-column)</button>
        <button class="tpl-btn p-3 rounded-md opacity-50 cursor-not-allowed" disabled>Pro — coming</button>
        <button class="tpl-btn p-3 rounded-md opacity-50 cursor-not-allowed" disabled>Premium — coming</button>
      </div>

      <hr class="border-cyan-700 my-3">
      <h3 class="text-cyan-200 font-semibold mb-2">Personal Info</h3>
      <div id="formFields" class="flex flex-col gap-2">
        <input id="nameInput" placeholder="Full name" class="w-full p-2 rounded border border-cyan-500 bg-black/20 text-white"/>
        <input id="titleInput" placeholder="Objective / Title" class="w-full p-2 rounded border border-cyan-500 bg-black/20 text-white"/>
        <input id="contactInput" placeholder="Email • Phone • City" class="w-full p-2 rounded border border-cyan-500 bg-black/20 text-white"/>
      </div>
    </aside>

    <!-- CENTER PANEL -->
    <section class="col-span-6 glass-panel p-4 shadow-lg overflow-auto">
      <div class="paper bg-black/20 rounded-xl p-4" id="previewContainer">
        <div id="preview">Loading template…</div>
      </div>
    </section>

    <!-- RIGHT PANEL -->
    <aside class="col-span-3 glass-panel p-4 shadow-lg flex flex-col gap-4">
      <h3 class="text-cyan-200 font-semibold mb-2">Sections & Indicators</h3>
      <div id="sectionsList" class="flex flex-col gap-2 text-sm text-cyan-100"></div>
    </aside>
  </main>

  <footer>Runvai • Futuristic Builder 2.1 — PDF export enabled</footer>

</div>

<!-- JS LOGIC: paste your template + builder JS code here -->
<script>
  /* REUSE your original TEMPLATES object and JS functions here, 
     just make sure preview styling uses neon/glass as above */
</script>

</body>
</html>
