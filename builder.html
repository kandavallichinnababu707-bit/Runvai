<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build Resume</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.2/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans p-6">
  <h1 class="text-2xl font-bold text-indigo-600 mb-4">Build Your Resume</h1>

  <div class="grid md:grid-cols-2 gap-6">
    <!-- Form -->
    <div class="bg-white p-6 rounded shadow space-y-4">
      <input id="name" placeholder="Full Name" class="w-full p-2 border rounded"/>
      <textarea id="summary" placeholder="Summary" class="w-full p-2 border rounded"></textarea>
      <textarea id="experience" placeholder="Experience" class="w-full p-2 border rounded"></textarea>
      <input id="skills" placeholder="Skills (comma separated)" class="w-full p-2 border rounded"/>
      <button onclick="downloadPDF()" class="px-4 py-2 bg-indigo-600 text-white rounded">Download PDF</button>
    </div>

    <!-- Preview -->
    <div class="bg-white p-6 rounded shadow">
      <h2 class="font-semibold mb-2">Preview</h2>
      <div id="resume-preview" class="p-4 border rounded text-sm">
        <h1 class="text-xl font-bold" id="preview-name">Full Name</h1>
        <p class="italic text-gray-600" id="preview-summary">Professional summary...</p>
        <h3 class="mt-3 font-semibold">Experience</h3>
        <p id="preview-experience">Company - Role - Achievements...</p>
        <h3 class="mt-3 font-semibold">Skills</h3>
        <p id="preview-skills">Technical skills...</p>
      </div>
    </div>
  </div>

  <script>
    const fields = ["name", "summary", "experience", "skills"];
    fields.forEach(id => {
      document.getElementById(id).addEventListener("input", () => {
        document.getElementById("preview-" + id).innerText = document.getElementById(id).value || document.getElementById(id).placeholder;
      });
    });

    function downloadPDF() {
      const element = document.getElementById('resume-preview');
      html2pdf().from(element).save('resume.pdf');
    }
  </script>
</body>
</html>
